[[redirects]]
  from = "/api/potholes"
  to = "/.netlify/functions/potholes"
  status = 200

[[redirects]]
  from = "/api/reports"
  to = "/.netlify/functions/submit-report"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"
